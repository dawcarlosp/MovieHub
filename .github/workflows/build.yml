name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  backend:
    name: Backend - Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MovieHubAPI/MovieHubAPI.slnx

      - name: Build
        run: dotnet build MovieHubAPI/MovieHubAPI.slnx --configuration Release

      - name: Test
        run: dotnet test MovieHubAPI.Tests --configuration Release --verbosity normal

  frontend:
    name: Frontend - Build & Test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: MovieHubAngular

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration production

      - name: Test
        run: npx vitest run --reporter verbose
