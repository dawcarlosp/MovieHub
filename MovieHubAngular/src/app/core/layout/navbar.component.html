<mat-toolbar class="navbar navbar--solid">
  <div class="navbar__left">
    <span class="navbar__logo">MOVIE<span class="navbar__logo--accent">HUB</span></span>
    <nav class="navbar__links">
      <a mat-button class="navbar__link"
         [class.navbar__link--active]="activeView() === 'home'"
         (click)="homeClick.emit()">
        Inicio
      </a>
      <button mat-button
              class="navbar__link"
              [class.navbar__link--active]="activeView() === 'genero'"
              [matMenuTriggerFor]="menuPeliculas">
        Películas
        <mat-icon class="navbar__chevron">expand_more</mat-icon>
      </button>
      <mat-menu #menuPeliculas="matMenu" class="genre-menu">
        @for (genero of generos(); track trackByGeneroId($index, genero)) {
          <button mat-menu-item (click)="selectGenero.emit(genero)">
            <span>{{ genero.nombre }}</span>
          </button>
        }
      </mat-menu>
        <a mat-button class="navbar__link"
           [class.navbar__link--active]="activeView() === 'favoritos'"
           (click)="favoritosClick.emit()">Mi lista</a>
    </nav>
  </div>
  <div class="navbar__right">
    <button mat-icon-button class="navbar__hamburger"
            [matMenuTriggerFor]="menuHamburguesa"
            aria-label="Menú de navegación">
      <mat-icon>menu</mat-icon>
    </button>
    <button mat-icon-button aria-label="Buscar" matTooltip="Buscar películas">
      <mat-icon>search</mat-icon>
    </button>
    @if (authService.isLoggedIn(); as logged) {
      <button mat-icon-button [matMenuTriggerFor]="menuUsuario" class="navbar__avatar" matTooltip="Mi perfil">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #menuUsuario="matMenu" class="hamburger-menu">
        <span mat-menu-item disabled class="navbar__user-info">
          <mat-icon>person</mat-icon>
          <span>{{ authService.currentUser()?.userName }}</span>
        </span>
        <mat-divider class="hamburger__divider" />
        <button mat-menu-item (click)="logoutClick.emit()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    } @else {
      <button mat-button class="navbar__link" (click)="loginClick.emit()">Iniciar sesión</button>
      <button mat-raised-button color="primary" (click)="registerClick.emit()" class="navbar__register-btn">Registrarse</button>
    }
  </div>
</mat-toolbar>

<mat-menu #menuHamburguesa="matMenu" class="hamburger-menu">
  <button mat-menu-item class="hamburger__item"
          [class.hamburger__item--active]="activeView() === 'home'"
          (click)="homeClick.emit()">
    <mat-icon>home</mat-icon>
    <span>Inicio</span>
  </button>

  <mat-divider class="hamburger__divider" />

  <button mat-menu-item class="hamburger__trigger"
          [class.hamburger__item--active]="activeView() === 'genero'"
          [class.hamburger__trigger--expanded]="peliculasExpanded()"
          (click)="togglePeliculas.emit(); $event.stopPropagation()">
    <mat-icon>movie</mat-icon>
    <span>Películas</span>
    <mat-icon class="hamburger__chevron">expand_more</mat-icon>
  </button>
  @if (peliculasExpanded()) {
    <div class="hamburger__sub">
      @for (genero of generos(); track trackByGeneroId($index, genero)) {
        <button mat-menu-item class="hamburger__genre" (click)="selectGenero.emit(genero)">
          <span>{{ genero.nombre }}</span>
        </button>
      }
    </div>
  }

  <mat-divider class="hamburger__divider" />

    <button mat-menu-item class="hamburger__item"
            [class.hamburger__item--active]="activeView() === 'favoritos'"
            (click)="favoritosClick.emit()">
    <mat-icon>favorite_border</mat-icon>
    <span>Mi lista</span>
  </button>
</mat-menu>
